<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azan.AI - Future of Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
      /* General Settings */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: radial-gradient(circle, #1a1a2e 0%, #0f0f1a 100%);
    color: #ffffff;
    font-family: 'Poppins', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
}

/* Background Animation */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
    opacity: 0.1;
    z-index: -1;
}

.container {
    width: 90%;
    max-width: 600px;
    text-align: center;
    padding: 20px;
}

/* Logo & Text */
.logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 3rem;
    letter-spacing: 5px;
    color: #fff;
    text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff;
    margin-bottom: 10px;
}

.logo span {
    color: #00d2ff;
}

.tagline {
    font-weight: 300;
    opacity: 0.7;
    margin-bottom: 40px;
}

/* Input Box */
.main-box {
    background: rgba(255, 255, 255, 0.05);
    padding: 20px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
}

.input-group {
    position: relative;
    margin-bottom: 20px;
}

.icon-bolt {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #00d2ff;
}

input {
    width: 100%;
    padding: 15px 15px 15px 45px;
    background: #0f0f1a;
    border: 2px solid #16213e;
    border-radius: 12px;
    color: white;
    font-size: 1rem;
    transition: 0.3s;
}

input:focus {
    outline: none;
    border-color: #00d2ff;
    box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
}

/* Button */
button#generateBtn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(90deg, #00d2ff, #3a7bd5);
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: bold;
    font-size: 1.1rem;
    cursor: pointer;
    transition: 0.3s;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

button#generateBtn:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
}

/* Result Area */
.result-container {
    margin-top: 30px;
    background: #16213e;
    border-radius: 15px;
    overflow: hidden;
    text-align: left;
    display: none; /* Pehle hidden rahega */
}

.result-header {
    background: #1a1a2e;
    padding: 10px 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.9rem;
    color: #00d2ff;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.result-body {
    padding: 20px;
    line-height: 1.6;
}

.copy-btn {
    background: transparent;
    border: none;
    color: white;
    cursor: pointer;
}

/* Ad Space */
.ad-space {
    margin-top: 30px;
    padding: 10px;
    border: 1px dashed rgba(255,255,255,0.2);
    border-radius: 10px;
    opacity: 0.5;
}

footer {
    margin-top: 50px;
    font-size: 0.8rem;
    opacity: 0.6;
}
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="container">
        <header>
            <h1 class="logo">AZAN<span>.AI</span></h1>
            <p class="tagline">Empowering your thoughts with Artificial Intelligence</p>
        </header>

        <div class="main-box">
            <div class="input-group">
                <i class="fa-solid fa-bolt icon-bolt"></i>
                <input type="text" id="userInput" placeholder="Yahan apna sawal likhein...">
            </div>
            
            <button id="generateBtn" onclick="generateAI()">
                <span class="btn-text">Generate Now</span>
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>

        <div class="result-container" id="resultBox">
            <div class="result-header">
                <span><i class="fa-solid fa-robot"></i> Azan.AI Response:</span>
                <button class="copy-btn" onclick="copyText()"><i class="fa-regular fa-copy"></i></button>
            </div>
            <div class="result-body">
                <p id="outputText">Main aapki madad ke liye tayyar hoon. Kuch bhi puchiye!</p>
            </div>
        </div>

        <div class="ad-space">
            <p><small>Sponsored Ad Space</small></p>
        </div>

        <footer>
            <p>&copy; 2024 Azan.AI | Created by Azan</p>
        </footer>
    </div>

    <script >
	function generateAI() {
    const input = document.getElementById("userInput").value;
    const resultBox = document.getElementById("resultBox");
    const outputText = document.getElementById("outputText");
    const btn = document.getElementById("generateBtn");

    if (input.trim() === "") {
        alert("Azan.AI: Meherbani karke pehle kuch likhen!");
        return;
    }

    // Button ko disable karna taake baar baar click na ho
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';

    // Result box ko show karna
    resultBox.style.display = "block";
    outputText.innerText = "Azan.AI aapka jawab soch raha hai...";

    // Yeh hissa Asli AI ko simulate karta hai
    // Jab aap API key lagayenge to asli jawab ayega
    setTimeout(() => {
        outputText.innerText = "Shukriya! Aapne pucha: '" + input + "'. \n\nAzan.AI abhi development phase mein hai. Isse mukammal tor par 'Zinda' karne ke liye humein OpenAI API connect karni hogi. Lekin aapka Frontend (Design) ab bilkul tayyar hai!";
        
        btn.disabled = false;
        btn.innerHTML = 'Generate Now <i class="fa-solid fa-paper-plane"></i>';
    }, 2000);
}

// Copy function
function copyText() {
    const text = document.getElementById("outputText").innerText;
    navigator.clipboard.writeText(text);
    alert("Text copy ho gaya!");
}
</script>
</body>
</html>
