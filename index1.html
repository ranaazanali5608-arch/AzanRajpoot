<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajpoot Traders & Marketing | Online Store</title>
    <style>
        :root { --primary: #25D366; --accent: #d4af37; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f9f9f9; color: #333; }
        
        /* Header Style */
        header { 
            background: var(--dark); 
            color: var(--accent); 
            padding: 30px 15px; 
            text-align: center; 
            border-bottom: 4px solid var(--accent);
        }
        header h1 { margin: 0; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }
        header p { color: #fff; margin-top: 5px; font-size: 14px; opacity: 0.8; }

        .container { max-width: 900px; margin: 20px auto; padding: 15px; }

        /* City Filter Section */
        .filter-card { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-bottom: 25px;
            border-left: 5px solid var(--accent);
        }
        label { font-weight: bold; display: block; margin-bottom: 10px; }
        select { 
            width: 100%; 
            padding: 12px; 
            border-radius: 8px; 
            border: 2px solid #eee; 
            font-size: 16px; 
            outline: none;
        }

        /* Items Grid */
        .items-container { display: grid; gap: 20px; }
        .product-card { 
            background: white; 
            border-radius: 12px; 
            padding: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: 0.3s;
        }
        .product-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .product-info h3 { margin: 0 0 5px 0; font-size: 20px; color: var(--dark); }
        .product-info .price { color: var(--accent); font-weight: bold; font-size: 18px; }

        .order-actions { text-align: right; }
        .qty-label { font-size: 12px; display: block; margin-bottom: 5px; color: #777; }
        input[type="number"] { 
            width: 70px; 
            padding: 8px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            margin-bottom: 10px; 
            text-align: center;
        }

        .btn-whatsapp { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            gap: 8px;
            text-decoration: none;
            font-size: 14px;
        }
        .btn-whatsapp:hover { background: #1da851; }

        .error-msg { 
            background: #ffebee; 
            color: #c62828; 
            padding: 15px; 
            border-radius: 8px; 
            text-align: center; 
            display: none; 
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>Rajpoot Traders & Marketing</h1>
    <p>Premium Wholesale & Retail Services</p>
</header>

<div class="container">
    <div class="filter-card">
        <label>Select Your City (Delivery Area Only):</label>
        <select id="citySelect" onchange="checkCity()">
            <option value="invalid">-- Select City --</option>
            <option value="rahimyar-khan">Rahim Yar Khan</option>
            <option value="sadiqabad">Sadiqabad</option>
            <option value="other">Other (Service Not Available)</option>
        </select>
    </div>

    <div id="errorMsg" class="error-msg">?? Maafi chahte hain! Hum sirf apne makhsoos ilaqon mein delivery karte hain.</div>

    <div id="productList" class="items-container" style="opacity: 0.2; pointer-events: none;">
        
        <div class="product-card">
            <div class="product-info">
                <h3>Product Item One</h3>
                <div class="price">Rs. 450</div>
            </div>
            <div class="order-actions">
                <span class="qty-label">Quantity:</span>
                <input type="number" id="qty1" value="1" min="1">
                <button class="btn-whatsapp" onclick="sendOrder('Product Item One', 'qty1', '450')">
                    Order via WhatsApp
                </button>
            </div>
        </div>

        <div class="product-card">
            <div class="product-info">
                <h3>Product Item Two</h3>
                <div class="price">Rs. 980</div>
            </div>
            <div class="order-actions">
                <span class="qty-label">Quantity:</span>
                <input type="number" id="qty2" value="1" min="1">
                <button class="btn-whatsapp" onclick="sendOrder('Product Item Two', 'qty2', '980')">
                    Order via WhatsApp
                </button>
            </div>
        </div>

    </div>
</div>

<script>
    // --- SETTINGS ---
    const myWhatsAppNumber = "923000000000"; // Apna real number yahan likhen

    function checkCity() {
        const city = document.getElementById('citySelect').value;
        const list = document.getElementById('productList');
        const error = document.getElementById('errorMsg');

        if (city === "invalid" || city === "other") {
            list.style.opacity = "0.2";
            list.style.pointerEvents = "none";
            error.style.display = (city === "other") ? "block" : "none";
        } else {
            list.style.opacity = "1";
            list.style.pointerEvents = "auto";
            error.style.display = "none";
        }
    }

    function sendOrder(name, qtyId, price) {
        const qty = document.getElementById(qtyId).value;
        const cityElement = document.getElementById('citySelect');
        const cityName = cityElement.options[cityElement.selectedIndex].text;
        
        const total = parseInt(qty) * parseInt(price);
        
        // WhatsApp Message Text
        const text = `*NEW ORDER: Rajpoot Traders*%0A` +
                     `--------------------------%0A` +
                     `*Item:* ${name}%0A` +
                     `*Quantity:* ${qty}%0A` +
                     `*Price per unit:* Rs. ${price}%0A` +
                     `*Total Amount:* Rs. ${total}%0A` +
                     `*City:* ${cityName}%0A` +
                     `--------------------------%0A` +
                     `Kindly confirm my order!`;

        window.open(`https://wa.me/${myWhatsAppNumber}?text=${text}`, '_blank');
    }
</script>

</body>
</html>
